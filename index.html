<!doctype html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta charset="UTF-8" />
<title>Driver Pay App v5.2.3</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-v5-192.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Driver Pay v5" />
    <meta name="author" content="Hristomir Ivanov" />
    <meta name="app-owner" content="Itso" />
  
    <script>
      (function () {
        var lastTouchEnd = 0;
        document.addEventListener('touchmove', function (event) {
          if (event.touches && event.touches.length > 1) {
            event.preventDefault();
          }
        }, { passive: false });

        document.addEventListener('gesturestart', function (event) {
          event.preventDefault();
        }, { passive: false });

        document.addEventListener('touchend', function (event) {
          var now = Date.now();
          if (now - lastTouchEnd <= 300) {
            event.preventDefault();
          }
          lastTouchEnd = now;
        }, { passive: false });
      })();
    </script>

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
